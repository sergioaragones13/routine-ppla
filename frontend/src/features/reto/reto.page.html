<div class="routine__app-shell routine__shell">
  <header class="routine__header routine__header--planner">
    <div class="routine__header-row">
      <div class="routine__header-main">
        <div class="routine__logo">
          <div class="routine__logo-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="routine__brand-mark-icon">
              <path d="M3.5 9.5h1.8v5H3.5z"></path>
              <path d="M5.8 8h2.2v8H5.8z"></path>
              <path d="M8.6 11h6.8v2H8.6z"></path>
              <path d="M16 8h2.2v8H16z"></path>
              <path d="M18.7 9.5h1.8v5h-1.8z"></path>
            </svg>
          </div>
          <div class="routine__logo-text">
            <span class="routine__logo-title">Challenge</span>
            <span class="routine__logo-subtitle">Commit and check every day</span>
          </div>
        </div>
      </div>
      <nav class="routine__nav-chips" aria-label="App sections">
        <a class="routine__session-btn routine__nav-chip routine__nav-chip--home" href="./?page=home">Home</a>
        <a class="routine__session-btn routine__nav-chip" href="./?page=workout">Train</a>
      </nav>
    </div>
  </header>

  <main class="routine__challenge">
    <div class="routine__challenge-tools">
      <button type="button" class="routine__challenge-settings-btn" id="challengeOpenSettings" aria-label="Edit challenge dates">
        <span class="routine__challenge-settings-icon" aria-hidden="true">⚙</span>
        <span>Edit challenge</span>
      </button>
    </div>

    <section class="routine__challenge-card">
      <div class="routine__challenge-progress-row">
        <h3 class="routine__editor-day-title">Calendar</h3>
        <span class="routine__day-progress" id="challengeProgress">0 trained · 0 failed</span>
      </div>
      <div class="routine__challenge-calendar-head">
        <button type="button" class="routine__notes-save" id="challengePrevMonth">Prev</button>
        <span class="routine__challenge-month" id="challengeMonthLabel">-</span>
        <button type="button" class="routine__notes-save" id="challengeNextMonth">Next</button>
      </div>
      <div class="routine__challenge-weekdays">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div class="routine__challenge-calendar" id="challengeCalendar" aria-live="polite"></div>
    </section>
  </main>
</div>

<section class="routine__confirm-modal" id="challengeSettingsModal" aria-hidden="true">
  <div class="routine__confirm-modal-card routine__challenge-settings-modal-card">
    <div class="routine__challenge-settings-header">
      <h3 class="routine__editor-day-title">Challenge settings</h3>
      <button type="button" class="routine__session-btn" id="challengeSettingsClose">Close</button>
    </div>
    <p class="routine__editor-hint">Define start and end dates. Progress is read-only from Social check-ins.</p>
    <div class="routine__challenge-setup routine__challenge-setup--open" id="challengeSetup">
      <label class="routine__notes-label" for="challengeStartInput">Challenge start date</label>
      <div class="routine__challenge-setup-row">
        <input id="challengeStartInput" class="routine__editor-input" type="date" />
        <input id="challengeEndInput" class="routine__editor-input" type="date" />
        <button type="button" class="routine__timer-btn routine__timer-btn--primary" id="challengeStartBtn">
          Save range
        </button>
      </div>
      <p class="routine__editor-hint" id="challengeMeta">No active challenge yet.</p>
    </div>
  </div>
</section>
