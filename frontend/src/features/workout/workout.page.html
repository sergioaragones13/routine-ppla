<div class="routine__app-shell routine__shell" id="appShell">
  <header class="routine__header routine__header--workout">
    <div class="routine__workout-sticky">
      <div class="routine__header-row">
        <div class="routine__header-main">
          <div class="routine__logo">
            <div class="routine__logo-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="routine__brand-mark-icon">
                <path d="M3.5 9.5h1.8v5H3.5z"></path>
                <path d="M5.8 8h2.2v8H5.8z"></path>
                <path d="M8.6 11h6.8v2H8.6z"></path>
                <path d="M16 8h2.2v8H16z"></path>
                <path d="M18.7 9.5h1.8v5h-1.8z"></path>
              </svg>
            </div>
            <div class="routine__logo-text">
              <span class="routine__logo-title">Workout</span>
              <span class="routine__logo-subtitle">Pick a day · log sets · rest timer</span>
            </div>
          </div>
        </div>
        <nav class="routine__nav-chips" aria-label="App sections">
          <a class="routine__session-btn routine__nav-chip routine__nav-chip--home" href="./?page=home">Home</a>
          <a class="routine__session-btn routine__nav-chip" href="./?page=full-routine">Week view</a>
        </nav>
      </div>

      <div class="routine__control-deck routine__control-deck--compact">
        <div class="routine__week-panel">
          <span class="routine__week-panel-label" id="weeklyBarLabel">Training day</span>
          <div class="routine__weekly" id="weeklyBar" role="group" aria-labelledby="weeklyBarLabel">
            <button type="button" class="routine__weekly-day" data-week-day="monday" aria-label="Monday">Mon</button>
            <button type="button" class="routine__weekly-day" data-week-day="tuesday" aria-label="Tuesday">Tue</button>
            <button type="button" class="routine__weekly-day" data-week-day="wednesday" aria-label="Wednesday">Wed</button>
            <button type="button" class="routine__weekly-day" data-week-day="thursday" aria-label="Thursday">Thu</button>
            <button type="button" class="routine__weekly-day" data-week-day="friday" aria-label="Friday">Fri</button>
            <button type="button" class="routine__weekly-day" data-week-day="saturday" aria-label="Saturday">Sat</button>
            <button type="button" class="routine__weekly-day" data-week-day="sunday" aria-label="Sunday">Sun</button>
          </div>
        </div>
      </div>
    </div>

    <div class="routine__control-deck routine__control-deck--rest">
      <div class="routine__rest-panel" aria-label="Rest timer">
        <span class="routine__rest-panel-label">Rest</span>
        <div class="routine__timer-global">
          <div class="routine__timer-circle">
            <svg viewBox="0 0 40 40" class="routine__timer-svg" aria-hidden="true">
              <circle class="routine__timer-track" cx="20" cy="20" r="17"></circle>
              <circle class="routine__timer-progress" cx="20" cy="20" r="17"></circle>
            </svg>
            <span class="routine__timer-display" id="restTimerDisplay">00:00</span>
          </div>
          <div class="routine__time-picker" aria-label="Time picker">
            <div class="routine__time-wheel-wrap">
              <span class="routine__time-wheel-label">H</span>
              <div class="routine__time-wheel" id="timerHoursWheel" aria-label="Hours" tabindex="0"></div>
            </div>
            <div class="routine__time-wheel-wrap">
              <span class="routine__time-wheel-label">M</span>
              <div class="routine__time-wheel" id="timerMinutesWheel" aria-label="Minutes" tabindex="0"></div>
            </div>
            <div class="routine__time-wheel-wrap">
              <span class="routine__time-wheel-label">S</span>
              <div class="routine__time-wheel" id="timerSecondsWheel" aria-label="Seconds" tabindex="0"></div>
            </div>
          </div>
          <div class="routine__timer-controls">
            <button type="button" class="routine__timer-btn routine__timer-btn--primary" id="restTimerToggle">
              Start
            </button>
            <button type="button" class="routine__timer-btn" id="restTimerCancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="routine__grid">
    <div class="routine__day-card routine__day-card--push" data-day="monday">
      <div class="routine__day-header"><span class="routine__day-name">Monday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="monday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--pull" data-day="tuesday">
      <div class="routine__day-header"><span class="routine__day-name">Tuesday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="tuesday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--leg" data-day="wednesday">
      <div class="routine__day-header"><span class="routine__day-name">Wednesday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="wednesday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--arm" data-day="thursday">
      <div class="routine__day-header"><span class="routine__day-name">Thursday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="thursday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--custom" data-day="friday">
      <div class="routine__day-header"><span class="routine__day-name">Friday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="friday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--custom" data-day="saturday">
      <div class="routine__day-header"><span class="routine__day-name">Saturday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="saturday">Reset day</button>
      </div>
    </div>
    <div class="routine__day-card routine__day-card--custom" data-day="sunday">
      <div class="routine__day-header"><span class="routine__day-name">Sunday</span></div>
      <ul class="routine__exercise-list"></ul>
      <div class="routine__day-actions">
        <button type="button" class="routine__day-clear" data-day-clear="sunday">Reset day</button>
      </div>
    </div>
  </div>
</div>
